<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>掼蛋记牌器</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --header-bg: #16213e;
      --card-bg: #ffffff;
      --card-played: #FFD700;
      --card-text: #333;
      --suit-red: #d43030;
      --suit-black: #333;
      --joker-bg: #f0e6ff;
      --joker-text: #7c3aed;
      --ji-bg: #f5f0ff;
      --ji-text: #7c3aed;
      --heart-ji-bg: #fff5f5;
      --heart-ji-text: #d43030;
      --ak-bg: #f0f5ff;
      --ak-text: #1e40af;
      --voice-active: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--card-text);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--header-bg);
      padding: 3px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left h1 { font-size: 34px; font-weight: 800; color: #e94560; line-height: 1; }
    .header-left .sub { font-size: 7px; color: #666; margin-top: 1px; }
    .round-info { text-align: right; }
    .round-info .round-label { font-size: 7px; color: #888; }
    .round-info .round-num { font-size: 16px; font-weight: 900; color: #e94560; line-height: 1; }

    /* ── Stats ── */
    .stats-bar {
      background: var(--header-bg);
      padding: 2px 8px 4px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat-item { text-align: center; }
    .stat-val { font-size: 40px; font-weight: 900; color: #fff; line-height: 1; }
    .stat-val.warn { color: #FFE566; }
    .stat-val.danger { color: #e94560; }
    .stat-lbl { font-size: 6px; color: #555; text-transform: uppercase; margin-top: 1px; }

    /* ── Voice status ── */
    .voice-status {
      background: var(--header-bg);
      padding: 4px 10px;
      text-align: center;
      font-size: 10px;
      color: #666;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .voice-status.active {
      color: var(--voice-active);
      background: rgba(34,197,94,0.1);
    }
    .voice-status .listening {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--voice-active);
      margin-right: 4px;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    /* ── Card grid ── */
    .grid-wrap { padding: 3px 3px 82px; }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--cell-gap, 1px);
    }
    .card-cell {
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s, transform 0.1s, opacity 0.12s;
      user-select: none;
      -webkit-user-select: none;
      background: var(--card-bg);
      width: var(--cell-size);
      height: var(--cell-size);
    }
    .card-cell:active { transform: scale(0.93); }

    /* played: yellow background */
    .card-cell.played {
      background: #FFD700 !important;
      box-shadow: 0 0 4px rgba(255,215,0,0.5) !important;
      transform: scale(1.02) !important;
    }
    .card-cell.played .rank,
    .card-cell.played .suit-line,
    .card-cell.played .extra-tag {
      opacity: 0.2 !important;
      color: #888 !important;
    }

    /* click flash animation */
    @keyframes flash-yellow {
      0%   { background: #FFD700; transform: scale(1.05); }
      100% { background: #FFD700; transform: scale(1.02); }
    }
    .card-cell.just-played {
      animation: flash-yellow 0.2s ease-out forwards;
    }

    /* card types backgrounds (only apply when NOT played) */
    .card-cell.joker:not(.played)  { background: var(--joker-bg); }
    .card-cell.ji:not(.played)     { background: var(--ji-bg); }
    .card-cell.heart-ji:not(.played) { background: var(--heart-ji-bg); }
    .card-cell.ak:not(.played)    { background: var(--ak-bg); }

    /* text colors */
    .card-cell.red .rank  { color: var(--suit-red); }
    .card-cell.black .rank { color: var(--suit-black); }
    .card-cell.ji .rank,
    .card-cell.ji .extra-tag { color: var(--ji-text); }
    .card-cell.joker .rank { color: var(--joker-text); }
    .card-cell.heart-ji .rank { color: var(--heart-ji-text); }

    /* card text */
    .rank { font-size: 44px; font-weight: 900; line-height: 1; }
    .suit-line { font-size: 24px; font-weight: 800; }
    .extra-tag { font-size: 20px; font-weight: 900; margin-top: 0; letter-spacing: -0.3px; }

    /* ── Toolbar ── */
    .toolbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--header-bg);
      padding: 5px 8px;
      padding-bottom: max(5px, env(safe-area-inset-bottom));
      display: flex;
      gap: 5px;
      z-index: 20;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .btn {
      flex: 1;
      padding: 7px 0;
      border-radius: 6px;
      border: none;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.96); }
    .btn-summary { background: rgba(255,255,255,0.09); color: #bbb; }
    .btn-next    { background: #e94560; color: #fff; }
    .btn-reset   { background: rgba(200,50,50,0.15); color: #ff8888; }
    .btn-voice   { background: #1e40af; color: #fff; }
    .btn-voice.active { background: var(--voice-active); }

    /* ── Summary modal ── */
    .modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 30;
      align-items: flex-end;
    }
    .modal.open { display: flex; }
    .modal-sheet {
      background: var(--header-bg);
      width: 100%;
      border-radius: 14px 14px 0 0;
      padding: 12px 10px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      max-height: 65vh;
      overflow-y: auto;
    }
    .modal-handle {
      width: 36px; height: 3px;
      background: #444; border-radius: 2px;
      margin: 0 auto 10px;
    }
    .modal-title { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 10px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .modal-card {
      background: #0d1a30;
      border-radius: 8px;
      padding: 8px;
    }
    .modal-card-title {
      font-size: 18px; color: #666;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    .modal-row { display: flex; justify-content: space-between; align-items: center; padding: 1px 0; }
    .modal-row-name { font-size: 22px; color: #aaa; }
    .modal-row-num { font-size: 24px; font-weight: 800; color: #fff; }
    .modal-row-num.zero { color: #444; }
    .modal-row-num.low  { color: #FFE566; }
    .modal-row-num.out  { color: #e94560; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      top: 72px; left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: rgba(0,0,0,0.78);
      color: #fff;
      padding: 6px 22px;
      border-radius: 20px;
      font-size: 26px;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Voice help modal ── */
    .help-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 40;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .help-modal.open { display: flex; }
    .help-content {
      background: var(--header-bg);
      border-radius: 16px;
      padding: 20px;
      max-width: 400px;
      width: 100%;
    }
    .help-title { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 12px; text-align: center; }
    .help-item { font-size: 22px; color: #aaa; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .help-item strong { color: #FFE566; }
    .help-close {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <h1>🃏 掼蛋记牌器</h1>
    <div class="sub">点击或语音 · 标记已出</div>
  </div>
  <div class="round-info">
    <div class="round-label">第</div>
    <div class="round-num" id="roundNum">1</div>
    <div class="round-label">轮</div>
  </div>
</header>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-val" id="valTotal">28</div>
    <div class="stat-lbl">剩余</div>
  </div>
  <div class="stat-item">
    <div class="stat-val" id="valJoker">4</div>
    <div class="stat-lbl">王</div>
  </div>
  <div class="stat-item">
    <div class="stat-val" id="valJi">8</div>
    <div class="stat-lbl">极(2)</div>
  </div>
  <div class="stat-item">
    <div class="stat-val" id="valA">8</div>
    <div class="stat-lbl">A</div>
  </div>
  <div class="stat-item">
    <div class="stat-val" id="valK">8</div>
    <div class="stat-lbl">K</div>
  </div>
</div>

<!-- Voice status -->
<div class="voice-status" id="voiceStatus">
  🎤 点击「语音」按钮开始语音记牌
</div>

<!-- Card Grid -->
<div class="grid-wrap">
  <div class="card-grid" id="cardGrid"></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="btn btn-voice" id="btnVoice">🎤</button>
  <button class="btn btn-summary" id="btnSummary">📊</button>
  <button class="btn btn-next" id="btnNext">✅</button>
  <button class="btn btn-reset" id="btnReset">🗑</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Summary Modal -->
<div class="modal" id="summaryModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📊 剩余牌力分布</div>
    <div class="modal-grid" id="summaryContent"></div>
  </div>
</div>

<!-- Help Modal -->
<div class="help-modal" id="helpModal">
  <div class="help-content">
    <div class="help-title">🎤 语音指令</div>
    <div class="help-item"><strong>大王</strong> / <strong>小王</strong></div>
    <div class="help-item"><strong>黑桃2</strong> / <strong>梅花2</strong> / <strong>方块2</strong></div>
    <div class="help-item"><strong>红心2</strong> 或 <strong>红心极</strong></div>
    <div class="help-item"><strong>黑桃A</strong> / <strong>红心A</strong> / <strong>方块A</strong> / <strong>梅花A</strong></div>
    <div class="help-item"><strong>黑桃K</strong> / <strong>红心K</strong> / <strong>方块K</strong> / <strong>梅花K</strong></div>
    <div class="help-item"><strong>撤销</strong> - 取消上一张牌</div>
    <div class="help-item"><strong>下一轮</strong> - 清空进入下轮</div>
    <button class="help-close" id="btnHelpClose">知道了</button>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// 牌堆：两副牌，共28张关键牌
// ──────────────────────────────────────────────
const CARDS = [
  // 大王×2
  { rank:'大王', suit:'joker',  label:'大王', type:'joker',   color:'joker' },
  { rank:'大王', suit:'joker',  label:'大王', type:'joker',   color:'joker' },
  // 小王×2
  { rank:'小王', suit:'joker',  label:'小王', type:'joker',   color:'joker' },
  { rank:'小王', suit:'joker',  label:'小王', type:'joker',   color:'joker' },
  // 黑桃极2×2
  { rank:'2',  suit:'spades', label:'2♠极', type:'ji',     color:'black' },
  { rank:'2',  suit:'spades', label:'2♠极', type:'ji',     color:'black' },
  // 梅花极2×2
  { rank:'2',  suit:'clubs',  label:'2♣极', type:'ji',     color:'black' },
  { rank:'2',  suit:'clubs',  label:'2♣极', type:'ji',     color:'black' },
  // 方块极2×2
  { rank:'2',  suit:'diamonds',label:'2♦极', type:'ji',    color:'red' },
  { rank:'2',  suit:'diamonds',label:'2♦极', type:'ji',    color:'red' },
  // 红心极×2（♥极）
  { rank:'♥',  suit:'hearts', label:'红心极', type:'heart-ji', color:'red' },
  { rank:'♥',  suit:'hearts', label:'红心极', type:'heart-ji', color:'red' },
  // A×8
  { rank:'A',  suit:'spades',   label:'A♠', type:'ak', color:'black' },
  { rank:'A',  suit:'spades',   label:'A♠', type:'ak', color:'black' },
  { rank:'A',  suit:'hearts',   label:'A♥', type:'ak', color:'red' },
  { rank:'A',  suit:'hearts',   label:'A♥', type:'ak', color:'red' },
  { rank:'A',  suit:'diamonds', label:'A♦', type:'ak', color:'red' },
  { rank:'A',  suit:'diamonds', label:'A♦', type:'ak', color:'red' },
  { rank:'A',  suit:'clubs',    label:'A♣', type:'ak', color:'black' },
  { rank:'A',  suit:'clubs',    label:'A♣', type:'ak', color:'black' },
  // K×8
  { rank:'K',  suit:'spades',   label:'K♠', type:'ak', color:'black' },
  { rank:'K',  suit:'spades',   label:'K♠', type:'ak', color:'black' },
  { rank:'K',  suit:'hearts',   label:'K♥', type:'ak', color:'red' },
  { rank:'K',  suit:'hearts',   label:'K♥', type:'ak', color:'red' },
  { rank:'K',  suit:'diamonds', label:'K♦', type:'ak', color:'red' },
  { rank:'K',  suit:'diamonds', label:'K♦', type:'ak', color:'red' },
  { rank:'K',  suit:'clubs',    label:'K♣', type:'ak', color:'black' },
  { rank:'K',  suit:'clubs',    label:'K♣', type:'ak', color:'black' },
];

const SUIT_SYM = { spades:'♠', hearts:'♥', diamonds:'♦', clubs:'♣' };

// 语音关键词映射
const VOICE_MAP = {
  '大王': { rank:'大王', suit:'joker' },
  '大鬼': { rank:'大王', suit:'joker' },
  '小王': { rank:'小王', suit:'joker' },
  '小鬼': { rank:'小王', suit:'joker' },
  '黑桃二': { rank:'2', suit:'spades' },
  '黑桃2': { rank:'2', suit:'spades' },
  '黑桃极': { rank:'2', suit:'spades' },
  '梅花二': { rank:'2', suit:'clubs' },
  '梅花2': { rank:'2', suit:'clubs' },
  '梅花极': { rank:'2', suit:'clubs' },
  '方块二': { rank:'2', suit:'diamonds' },
  '方块2': { rank:'2', suit:'diamonds' },
  '方块极': { rank:'2', suit:'diamonds' },
  '红心二': { rank:'♥', suit:'hearts' },
  '红心2': { rank:'♥', suit:'hearts' },
  '红心极': { rank:'♥', suit:'hearts' },
  '红桃二': { rank:'♥', suit:'hearts' },
  '红桃2': { rank:'♥', suit:'hearts' },
  '红桃极': { rank:'♥', suit:'hearts' },
  '极': { rank:'2', suit:'any' }, // 单说"极"随机标记一个极牌
  '黑桃a': { rank:'A', suit:'spades' },
  '黑桃A': { rank:'A', suit:'spades' },
  '红心a': { rank:'A', suit:'hearts' },
  '红心A': { rank:'A', suit:'hearts' },
  '红桃a': { rank:'A', suit:'hearts' },
  '红桃A': { rank:'A', suit:'hearts' },
  '方块a': { rank:'A', suit:'diamonds' },
  '方块A': { rank:'A', suit:'diamonds' },
  '梅花a': { rank:'A', suit:'clubs' },
  '梅花A': { rank:'A', suit:'clubs' },
  '黑桃k': { rank:'K', suit:'spades' },
  '黑桃K': { rank:'K', suit:'spades' },
  '红心k': { rank:'K', suit:'hearts' },
  '红心K': { rank:'K', suit:'hearts' },
  '红桃k': { rank:'K', suit:'hearts' },
  '红桃K': { rank:'K', suit:'hearts' },
  '方块k': { rank:'K', suit:'diamonds' },
  '方块K': { rank:'K', suit:'diamonds' },
  '梅花k': { rank:'K', suit:'clubs' },
  '梅花K': { rank:'K', suit:'clubs' },
};

// ─── State ───────────────────────────────────
let played = new Set();
let history = [];
let round   = 1;
let recognition = null;
let voiceActive = false;

// ─── Build grid ──────────────────────────────
function buildGrid() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  CARDS.forEach((card, idx) => {
    const isPlayed = played.has(idx);
    const cell = document.createElement('div');
    cell.className = [
      'card-cell',
      card.type,
      card.color,
      isPlayed ? 'played' : ''
    ].join(' ');

    let html = `<span class="rank">${card.rank}</span>`;
    if (card.suit !== 'joker') {
      html += `<span class="suit-line">${SUIT_SYM[card.suit]}</span>`;
    }
    if (card.type === 'ji' || card.type === 'joker') {
      html += `<span class="extra-tag">极</span>`;
    }
    if (card.type === 'heart-ji') {
      html += `<span class="extra-tag" style="color:#d43030">极</span>`;
    }
    cell.innerHTML = html;
    cell.addEventListener('click', () => toggleCard(idx));
    grid.appendChild(cell);
  });
}

// ─── Resize cards to fit screen ───────────────
function resizeCards() {
  const COLS = 7;
  const ROWS = 4;
  const GAP  = 2;

  const wrap = document.querySelector('.grid-wrap');
  const availableW = wrap.clientWidth - GAP * (COLS + 1);
  const availableH = window.innerHeight - wrap.offsetTop - 82;

  const cellW = Math.floor(availableW / COLS);
  const cellH = Math.floor(availableH / ROWS);
  const cellSize = Math.min(cellW, cellH);

  document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
  document.documentElement.style.setProperty('--cell-gap', GAP + 'px');
}

// ─── Toggle ──────────────────────────────────
function toggleCard(idx) {
  if (played.has(idx)) {
    played.delete(idx);
    history.pop();
    showToast('取消：' + CARDS[idx].label);
  } else {
    played.add(idx);
    history.push(idx);
    showToast('已出：' + CARDS[idx].label);
  }
  updateStats();
  buildGrid();
}

// ─── Update stats ────────────────────────────
function updateStats() {
  const left = CARDS.length - played.size;
  const val = id => document.getElementById(id);

  val('valTotal').textContent = left;

  const jokerL = CARDS.filter((c,i) => c.type==='joker' && !played.has(i)).length;
  val('valJoker').textContent = jokerL;
  val('valJoker').className = 'stat-val' + (jokerL === 0 ? ' danger' : '');

  const jiL = CARDS.filter((c,i) => (c.type==='ji' || c.type==='heart-ji') && !played.has(i)).length;
  val('valJi').textContent = jiL;
  val('valJi').className = 'stat-val' + (jiL === 0 ? ' danger' : '');

  const aL = CARDS.filter((c,i) => c.rank==='A' && !played.has(i)).length;
  val('valA').textContent = aL;
  val('valA').className = 'stat-val' + (aL === 0 ? ' danger' : aL <= 2 ? ' warn' : '');

  const kL = CARDS.filter((c,i) => c.rank==='K' && !played.has(i)).length;
  val('valK').textContent = kL;
  val('valK').className = 'stat-val' + (kL === 0 ? ' danger' : kL <= 2 ? ' warn' : '');
}

// ─── Voice recognition ───────────────────────
function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('浏览器不支持语音识别');
    return false;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'zh-CN';

  recognition.onresult = (event) => {
    const last = event.results.length - 1;
    const text = event.results[last][0].transcript.trim();
    console.log('识别到:', text);
    processVoiceCommand(text);
  };

  recognition.onerror = (event) => {
    console.error('语音识别错误:', event.error);
    if (event.error === 'no-speech') {
      showToast('没有听到声音');
    }
  };

  recognition.onend = () => {
    if (voiceActive) {
      // 自动重启
      recognition.start();
    }
  };

  return true;
}

function processVoiceCommand(text) {
  // 检查特殊命令
  if (text.includes('撤销') || text.includes('取消')) {
    undoLast();
    return;
  }
  if (text.includes('下一轮') || text.includes('下一把') || text.includes('清空')) {
    nextRound();
    return;
  }

  // 匹配牌
  for (const [keyword, card] of Object.entries(VOICE_MAP)) {
    if (text.includes(keyword)) {
      markCardByVoice(card);
      return;
    }
  }

  showToast('未识别：' + text);
}

function markCardByVoice(cardInfo) {
  // 找到第一个匹配且未打出的牌
  let foundIdx = -1;

  if (cardInfo.suit === 'any') {
    // 单说"极"，随机标记一个未打出的极牌
    foundIdx = CARDS.findIndex((c, i) => 
      (c.type === 'ji' || c.type === 'heart-ji') && !played.has(i)
    );
  } else {
    foundIdx = CARDS.findIndex((c, i) => 
      c.rank === cardInfo.rank && c.suit === cardInfo.suit && !played.has(i)
    );
  }

  if (foundIdx >= 0) {
    played.add(foundIdx);
    history.push(foundIdx);
    showToast('已出：' + CARDS[foundIdx].label);
    updateStats();
    buildGrid();
  } else {
    // 已经打完了，提示
    const suitName = { spades:'黑桃', hearts:'红心', diamonds:'方块', clubs:'梅花', joker:'' }[cardInfo.suit];
    showToast(suitName + cardInfo.rank + ' 已打完');
  }
}

function toggleVoice() {
  if (!recognition && !initVoice()) return;

  voiceActive = !voiceActive;
  const btn = document.getElementById('btnVoice');
  const status = document.getElementById('voiceStatus');

  if (voiceActive) {
    recognition.start();
    btn.classList.add('active');
    status.classList.add('active');
    status.innerHTML = '<span class="listening"></span> 正在聆听...';
  } else {
    recognition.stop();
    btn.classList.remove('active');
    status.classList.remove('active');
    status.textContent = '🎤 点击「语音」按钮开始语音记牌';
  }
}

// ─── Undo ────────────────────────────────────
function undoLast() {
  if (history.length === 0) {
    showToast('没有可撤销的');
    return;
  }
  const idx = history.pop();
  played.delete(idx);
  showToast('撤销：' + CARDS[idx].label);
  updateStats();
  buildGrid();
}

// ─── Summary modal ───────────────────────────
function showSummary() {
  const el = document.getElementById('summaryContent');
  const sections = [
    {
      title: '🃏 王炸',
      rows: [
        { name:'大王', total:2, filter: c => c.label==='大王' },
        { name:'小王', total:2, filter: c => c.label==='小王' },
      ]
    },
    {
      title: '⚡ 极(2)',
      rows: [
        { name:'♠极', total:2, filter: c => c.label==='2♠极' },
        { name:'♣极', total:2, filter: c => c.label==='2♣极' },
        { name:'♦极', total:2, filter: c => c.label==='2♦极' },
        { name:'♥极', total:2, filter: c => c.label==='红心极' },
      ]
    },
    {
      title: '🅰️ A',
      rows: [
        { name:'♠A', total:2, filter: c => c.label==='A♠' },
        { name:'♥A', total:2, filter: c => c.label==='A♥' },
        { name:'♦A', total:2, filter: c => c.label==='A♦' },
        { name:'♣A', total:2, filter: c => c.label==='A♣' },
      ]
    },
    {
      title: '👑 K',
      rows: [
        { name:'♠K', total:2, filter: c => c.label==='K♠' },
        { name:'♥K', total:2, filter: c => c.label==='K♥' },
        { name:'♦K', total:2, filter: c => c.label==='K♦' },
        { name:'♣K', total:2, filter: c => c.label==='K♣' },
      ]
    },
  ];

  el.innerHTML = sections.map(sec => `
    <div class="modal-card">
      <div class="modal-card-title">${sec.title}</div>
      ${sec.rows.map(row => {
        const rem = CARDS.filter((c,i) => row.filter(c) && !played.has(i)).length;
        const cls = rem === 0 ? 'zero' : rem === 1 ? 'low' : '';
        return `<div class="modal-row">
          <span class="modal-row-name">${row.name}</span>
          <span class="modal-row-num ${cls}">${rem}/${row.total}</span>
        </div>`;
      }).join('')}
    </div>
  `).join('');

  document.getElementById('summaryModal').classList.add('open');
}

// ─── Actions ─────────────────────────────────
function nextRound() {
  played.clear(); history = []; round++;
  document.getElementById('roundNum').textContent = round;
  buildGrid(); updateStats();
  showToast('第 ' + round + ' 轮开始');
}

function resetAll() {
  if (!confirm('确定清空所有记录？')) return;
  played.clear(); history = []; round = 1;
  document.getElementById('roundNum').textContent = 1;
  buildGrid(); updateStats();
  showToast('已全部清空');
}

// ─── Toast ───────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1100);
}

// ─── Init ─────────────────────────────────────
document.getElementById('btnVoice').addEventListener('click', toggleVoice);
document.getElementById('btnSummary').addEventListener('click', showSummary);
document.getElementById('btnNext').addEventListener('click', nextRound);
document.getElementById('btnReset').addEventListener('click', resetAll);

document.getElementById('summaryModal').addEventListener('click', e => {
  if (e.target === document.getElementById('summaryModal'))
    document.getElementById('summaryModal').classList.remove('open');
});

document.getElementById('helpModal').addEventListener('click', e => {
  if (e.target === document.getElementById('helpModal') || e.target.id === 'btnHelpClose')
    document.getElementById('helpModal').classList.remove('open');
});

buildGrid();
resizeCards();
updateStats();

window.addEventListener('resize', resizeCards);
window.addEventListener('orientationchange', () => setTimeout(resizeCards, 100));

// 首次打开显示语音帮助
setTimeout(() => {
  document.getElementById('helpModal').classList.add('open');
}, 500);
</script>
